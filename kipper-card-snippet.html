<!-- Kipper — Scientific Truth Filter for X -->
<a href="kipper.html" class="carousel-card" data-color="green" style="flex: 0 0 420px;">
    <div class="carousel-card-visual" style="height:280px; background:#05080f; overflow:hidden; position:relative;">

        <!-- Subtle grid -->
        <div style="position:absolute;inset:0;
            background-image: linear-gradient(rgba(61,220,132,0.03) 1px, transparent 1px),

        <!-- Emerald radial glow -->

             style="position:absolute;inset:0;width:100%;height:100%;"
             font-family="'Share Tech Mono', 'Courier New', monospace">

            <defs>
                <filter id="kip-glow">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="kip-glow-gold">
                    <feGaussianBlur stdDeviation="2.5" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <linearGradient id="kipFilterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#3ddc84" stop-opacity="0.08"/>
                    <stop offset="100%" stop-color="#3ddc84" stop-opacity="0"/>
                </linearGradient>
                <style>
                    .kip-fade { opacity:0; animation: kipFadeIn 0.5s ease forwards; }
                    .kf1 { animation-delay: 0.1s; }
                    .kf2 { animation-delay: 0.3s; }
                    .kf3 { animation-delay: 0.5s; }
                    .kf4 { animation-delay: 0.7s; }
                    .kf5 { animation-delay: 0.9s; }
                    .kf6 { animation-delay: 1.1s; }
                    @keyframes kipFadeIn {
                        from { opacity:0; transform: translateY(4px); }
                        to   { opacity:1; transform: translateY(0); }
                    }
                    .kip-scan {
                        animation: kipScan 3s ease-in-out infinite;
                    }
                    @keyframes kipScan {
                        0%, 100% { opacity: 0.15; }
                        50% { opacity: 0.4; }
                    }
                    .kip-badge-pulse {
                        animation: kipBadgePulse 2s ease-in-out infinite;
                    }
                    @keyframes kipBadgePulse {
                        0%, 100% { opacity: 0.7; }
                        50% { opacity: 1; }
                    }
                </style>
            </defs>

            <!-- ═══ LEFT SIDE: X FEED ═══ -->

            <text x="20" y="22" font-size="7" fill="#4a5568" letter-spacing="2">X FEED</text>

            <!-- Post 3: Pending -->

                <circle cx="260" cy="174" r="4" fill="rgba(200,168,78,0.2)" stroke="rgba(200,168,78,0.4)" stroke-width="0.5"/>
                <circle cx="272" cy="174" r="4" fill="rgba(61,220,132,0.2)" stroke="rgba(61,220,132,0.4)" stroke-width="0.5"/>
                <circle cx="284" cy="174" r="4" fill="rgba(192,192,192,0.2)" stroke="rgba(192,192,192,0.4)" stroke-width="0.5"/>
                <circle cx="296" cy="174" r="4" fill="rgba(61,220,132,0.2)" stroke="rgba(61,220,132,0.4)" stroke-width="0.5"/>
                <circle cx="308" cy="174" r="4" fill="rgba(200,168,78,0.2)" stroke="rgba(200,168,78,0.4)" stroke-width="0.5"/>
                <text x="320" y="177" font-size="5.5" fill="#4a5568">+89</text>

                <!-- Network label -->
                <rect x="230" y="190" width="160" height="20" rx="3" fill="rgba(61,220,132,0.04)" stroke="rgba(61,220,132,0.1)" stroke-width="0.5"/>
                <circle cx="242" cy="200" r="3" fill="#3ddc84" opacity="0.6">
                    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>

                <text x="250" y="203" font-size="5" fill="#3ddc84" letter-spacing="1">QUAI NETWORK · PROOF-OF-ENTROPY-MINIMA</text>

                <!-- Powered by -->
                <text x="230" y="232" font-size="4.5" fill="#4a5568" letter-spacing="1">POWERED BY VERIFIED SCIENCE</text>
                <text x="230" y="242" font-size="4.5" fill="#c8a84e" letter-spacing="0.5">ENERGY-BACKED CREDIBILITY</text>
            </g>
        </svg>

        <!-- Card badges -->
        <span class="card-tag-top" style="background:rgba(6,8,13,0.85);backdrop-filter:blur(4px);border-color:rgba(61,220,132,0.3);color:#3ddc84;">Filter</span>

        <!-- Bottom bar -->
        <div style="position:absolute;bottom:0;left:0;right:0;
            background:linear-gradient(0deg, rgba(6,8,13,0.95) 0%, transparent 100%);

                box-shadow:0 0 8px rgba(61,220,132,0.7);display:inline-block;
                animation:pulse-green 2s ease-in-out infinite;"></span>
